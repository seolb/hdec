<head>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif; background: #f2f2ef; color: #1a1a1a; font-size: 15px; }

/* 헤더 */
.hdr { background: #1c2b3a; color: #fff; padding: 0.9rem 1rem 0.7rem; position: sticky; top: 0; z-index: 20; }
.hdr h1 { font-size: 15px; font-weight: 700; }
.hdr p { font-size: 11px; color: #8aafc8; margin-top: 2px; }

/* 탭 */
.tabs { display: flex; background: #162230; border-bottom: 1px solid #2a3f52; }
.tab { flex: 1; text-align: center; padding: 0.6rem; font-size: 13px; font-weight: 600; color: #6a9abf; cursor: pointer; border-bottom: 2px solid transparent; }
.tab.active { color: #fff; border-bottom-color: #4a9fd4; }

/* 카운터 */
.counter-bar { padding: 0.5rem 1rem; background: #fff; border-bottom: 1px solid #eee; font-size: 12px; color: #666; display: flex; gap: 12px; align-items: center; }
.cnt-badge { background: #e8f4fd; color: #1a6a9a; font-weight: 700; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
.cnt-badge.red { background: #fdeaea; color: #9a1a1a; }

/* 문제 섹션 헤더 */
.q-section { margin: 10px 10px 0; }
.q-title { background: #1c2b3a; color: #fff; border-radius: 10px 10px 0 0; padding: 0.6rem 0.9rem; font-size: 13px; font-weight: 700; display: flex; justify-content: space-between; align-items: center; }
.q-title span { font-size: 11px; color: #8aafc8; font-weight: 400; }

/* 암기 아이템 */
.item { background: #fff; border-left: 4px solid #eee; padding: 0.65rem 0.75rem 0.65rem 0.9rem; border-bottom: 1px solid #f0f0f0; display: flex; align-items: flex-start; gap: 0.6rem; }
.item:last-child { border-radius: 0 0 10px 10px; border-bottom: none; }
.item.o-item { border-left-color: #3a9a5c; }
.item.x-item { border-left-color: #e05252; }
.item.marked { background: #fffbf0; }
.item-body { flex: 1; min-width: 0; }
.item-stmt { font-size: 13px; line-height: 1.55; color: #222; }
.item-fix { margin-top: 5px; font-size: 12px; color: #1a6090; background: #edf6fd; padding: 4px 8px; border-radius: 5px; line-height: 1.5; }
.item-fix::before { content: "→ 정정: "; font-weight: 700; color: #1a6090; }
.badge-ox { flex-shrink: 0; width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; margin-top: 1px; }
.badge-o { background: #d4f4e0; color: #1a7a3a; }
.badge-x { background: #fde0e0; color: #c03030; }
.btn-mark { flex-shrink: 0; background: none; border: 1.5px solid #ccc; color: #999; font-size: 11px; font-weight: 600; padding: 3px 7px; border-radius: 20px; cursor: pointer; white-space: nowrap; margin-top: 2px; }
.btn-mark.on { background: #fff3cd; border-color: #e6a817; color: #a07010; }

/* 빈 상태 */
.empty { text-align: center; padding: 3rem 1rem; color: #aaa; font-size: 14px; }

/* 각주 */
.calc-note { font-size: 11px; color: #888; background: #f8f8f8; padding: 3px 8px; border-radius: 4px; margin-top: 4px; font-family: monospace; line-height: 1.6; }
</style>
</head>

// ========== 상태 ==========
let markedSet = new Set();
let currentTab = 'all';

function loadMarked() {
  try { markedSet = new Set(JSON.parse(localStorage.getItem('ox_marked') || '[]')); } catch(e) {}
}
function saveMarked() {
  try { localStorage.setItem('ox_marked', JSON.stringify([...markedSet])); } catch(e) {}
}
function toggleMark(id) {
  if (markedSet.has(id)) markedSet.delete(id);
  else markedSet.add(id);
  saveMarked();
  renderItem(id);
  updateCounter();
}
function setTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach((el,i) => el.classList.toggle('active', (i===0&&t==='all')||(i===1&&t==='marked')));
  renderAll();
}

function itemId(qi, ii) { return `q${qi}_i${ii}`; }

function renderItem(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const on = markedSet.has(id);
  el.classList.toggle('marked', on);
  const btn = el.querySelector('.btn-mark');
  if (btn) { btn.textContent = on ? '⭐ 모름' : '모름?'; btn.classList.toggle('on', on); }
}

function updateCounter() {
  const total = questions.reduce((s,q)=>s+q.items.length,0);
  document.getElementById('total-cnt').textContent = total;
  document.getElementById('mark-cnt').textContent = markedSet.size;
}

function renderAll() {
  const cont = document.getElementById('content');
  cont.innerHTML = '';

  if (currentTab === 'marked' && markedSet.size === 0) {
    cont.innerHTML = '<div class="empty">아직 체크한 항목이 없어요.<br>모르는 항목의 [모름?] 버튼을 눌러보세요!</div>';
    return;
  }

  questions.forEach(q => {
    const visibleItems = q.items.filter((_,ii) => currentTab === 'all' || markedSet.has(itemId(q.qnum, ii)));
    if (visibleItems.length === 0) return;

    const sec = document.createElement('div');
    sec.className = 'q-section';

    const xCount = visibleItems.filter(it=>it.ox==='X').length;
    const oCount = visibleItems.filter(it=>it.ox==='O').length;
    sec.innerHTML = `<div class="q-title">Q${q.qnum}. ${q.title}<span>O:${oCount} X:${xCount}</span></div>`;

    q.items.forEach((item, ii) => {
      const id = itemId(q.qnum, ii);
      if (currentTab === 'marked' && !markedSet.has(id)) return;

      const div = document.createElement('div');
      div.id = id;
      div.className = `item ${item.ox==='O'?'o-item':'x-item'}${markedSet.has(id)?' marked':''}`;
      div.innerHTML = `
        <div class="badge-ox ${item.ox==='O'?'badge-o':'badge-x'}">${item.ox==='O'?'O':'X'}</div>
        <div class="item-body">
          <div class="item-stmt">${item.stmt}</div>
          ${item.ox==='X'&&item.fix ? `<div class="item-fix">${item.fix}</div>` : ''}
        </div>
        <button class="btn-mark ${markedSet.has(id)?'on':''}" onclick="toggleMark('${id}')">${markedSet.has(id)?'⭐ 모름':'모름?'}</button>
      `;
      sec.appendChild(div);
    });

    cont.appendChild(sec);
  });
}

loadMarked();
renderAll();
updateCounter();
</script>
